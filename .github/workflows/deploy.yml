name: Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17 19 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Reuse published package index
        if: github.event_name == 'push'
        run: |
          mkdir -p public
          curl --fail --silent --show-error --location \
            https://brewfile-picker.pages.dev/package-index.json \
            --output public/package-index.json

      - name: Generate Homebrew package index
        if: github.event_name != 'push'
        run: npm run update:index

      - name: Check package index
        run: npm run check:index

      - name: Validate presets
        run: npm run validate:presets

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          project_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/brewfile-picker"
          status=$(curl --silent --show-error --output /tmp/cloudflare-pages-project.json --write-out "%{http_code}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${project_url}")

          if [ "${status}" = "200" ]; then
            echo "Cloudflare Pages project already exists."
            exit 0
          fi

          if [ "${status}" != "404" ]; then
            cat /tmp/cloudflare-pages-project.json
            exit 1
          fi

          curl --fail --silent --show-error \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --data '{"name":"brewfile-picker","production_branch":"main"}' \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            --output /tmp/cloudflare-pages-project-create.json
          echo "Cloudflare Pages project created."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=brewfile-picker --commit-dirty=true
